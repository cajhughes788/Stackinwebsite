name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyAduz3L0Njzai70sQCJ_VumZzPZbtkmai4"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "trackd-optimized.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "trackd-optimized"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "trackd-optimized.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "107089161383"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:107089161383:web:72c53d9b195f676c573f82"
      NEXT_PUBLIC_API_SIGNUP: "https://signup-3lc2fwdgwq-uc.a.run.app"
      NEXT_PUBLIC_API_CREATE_CHECKOUT_SESSION: "https://createcheckoutsession-3lc2fwdgwq-uc.a.run.app"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
